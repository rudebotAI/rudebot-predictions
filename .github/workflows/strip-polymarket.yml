name: Strip Polymarket (one-shot)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Dry run (log only)
        run: python apply_polymarket_strip_v2.py

      - name: Apply strip
        run: python apply_polymarket_strip_v2.py --apply

      - name: Remove strip scripts
        run: |
          rm -f apply_polymarket_strip.py apply_polymarket_strip_v2.py
          rm -f .github/workflows/strip-polymarket.yml

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ -v --tb=short
        continue-on-error: true
        id: tests

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::pytest failed — see previous step output"
          exit 1

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Kalshi-only: strip Polymarket + Limitless, tighten safety, add CI"
          git push

