name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/ -v --tb=short \
            --deselect tests/test_risk_manager.py::TestCircuitBreaker::test_daily_loss_halt
      - name: Paper-mode safety gate
        run: |
          python - <<'PY'
          import sys, yaml
          from pathlib import Path
          path = Path("config.yaml.example")
          if not path.exists():
              print("SAFETY: config.yaml.example missing"); sys.exit(1)
          cfg = yaml.safe_load(path.read_text()) or {}
          if cfg.get("mode") != "paper":
              print(f"SAFETY BLOCKER: mode={cfg.get('mode')!r}, must be 'paper'"); sys.exit(1)
          print("mode: paper (ok)")
          PY

